  <!-- کانتینر ساعت در پایین صفحه -->
    <div class="clock-container">
        <div id="clock">00:00:00</div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const tehranTime = now.toLocaleTimeString("en-US", {
                timeZone: "Asia/Tehran",
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            });
            document.getElementById('clock').innerText = tehranTime;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
