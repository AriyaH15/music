*{margin:0;

body {

audio {color:red;
justify-content: center;
box-shadow:1px 2px 20px red;
border-radius:100px;
text-align:center;
max-width:100%;
animation-name:music;
animation-duration:10s;
animation-iteration-count:infinite;}


.musics {justify-content: center;
text-align: center;
display: flex;
flex-direction: column;
align-items: center;}

@keyframes music{
0%{border:solid red;box-shadow:1px 2px 20px red;}
10%{border:solid rgb(51, 255, 0);box-shadow:1px 2px 20px rgb(51, 255, 0);}
20%{border:solid rgb(38, 0, 255);box-shadow:1px 2px 20px rgb(38, 0, 255);}
30%{border:solid rgb(212, 0, 255);box-shadow:1px 2px 20px rgb(212, 0, 255);}
40%{border:solid rgb(255, 174, 0);box-shadow:1px 2px 20px rgb(255, 174, 0);}
50%{border:solid rgb(0, 255, 242);box-shadow:1px 2px 20px rgb(0, 255, 242);}
60%{border:solid rgb(255, 251, 0);box-shadow:1px 2px 20px rgb(255, 251, 0);}
70%{border:solid #ffffff;box-shadow:1px 2px 20px #ffffff;}
80%{border:solid rgb(195, 0, 255);box-shadow:1px 2px 20px rgb(195, 0, 255);}
90%{border:solid rgb(158, 107, 49);box-shadow:1px 2px 20px rgb(158, 107, 49);}
100%{border:solid rgb(107, 2, 33);box-shadow:1px 2px 20px rgb(107, 2, 33);}
