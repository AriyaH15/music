body{background-repeat:no-repeat;

.png1 {
height: 10px;
position:absolute;
right:850px;
top:350px;
background-repeat:no-repeat;
filter: drop-shadow(5px 5px 30px rgb(0, 0, 0));
animation:png1 12s;
animation-iteration-count:infinite;}




@keyframes png1 {
50%{

100%{

 /* --- کانتینر جدید برای ساعت --- */
        .clock-container {
            position: fixed; /* ثابت در صفحه */
            bottom: 0; /* چسبیده به پایین */
            left: -20px; /* چسبیده به چپ */
            width: 100%; /* کل عرض صفحه */
            display: flex;
            justify-content: center; /* افقی در مرکز */
            padding-bottom: 20px; /* کمی فاصله از لبه پایین */
            box-sizing: border-box; /* برای اینکه padding روی عرض تاثیر نگذارد */
        }

        #clock {
            font-size: 5rem; /* کمی کوچک‌تر برای تناسب با قرار گرفتن در پایین */
            color: rgba(255, 255, 255, 0.85); 
            font-weight: bold;
            padding: 20px 40px; /* اندازه‌ی padding */
            border-radius: 15px; /* گوشه‌های گرد */
            backdrop-filter: blur(15px) saturate(180%); 
            -webkit-backdrop-filter: blur(15px) saturate(180%); 
            box-shadow: 0 8px 32px 0 rgb(0, 0, 0); 
            text-shadow: 0 0 20px rgb(255, 255, 255);
            animation-name:io;
               animation-duration:1000s;
               animation-iteration-count:infinite;

  <!-- کانتینر ساعت در پایین صفحه -->
    <div class="clock-container">
        <div id="clock">00:00:00</div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const tehranTime = now.toLocaleTimeString("en-US", {
                timeZone: "Asia/Tehran",
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            });
            document.getElementById('clock').innerText = tehranTime;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
